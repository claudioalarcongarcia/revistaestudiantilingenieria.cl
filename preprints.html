<script>
const SHEET_ID = "1qATJ1zbOpkvfCjJJDJShPq7SbxzUdlQQ3GuurtkmmVY";
const SHEET_NAME = "Hoja 01";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

function parseCSV(text){
  const rows = [];
  let row = [];
  let cur = "";
  let inQuotes = false;

  for(let i = 0; i < text.length; i++){
    const c = text[i];
    const n = text[i + 1];

    if(c === '"' && inQuotes && n === '"'){ cur += '"'; i++; continue; }
    if(c === '"'){ inQuotes = !inQuotes; continue; }

    if(c === "," && !inQuotes){ row.push(cur); cur = ""; continue; }

    if((c === "\n" || c === "\r") && !inQuotes){
      if(c === "\r" && n === "\n") i++;
      row.push(cur);
      cur = "";
      if(row.some(x => x.trim() !== "")) rows.push(row);
      row = [];
      continue;
    }

    cur += c;
  }

  row.push(cur);
  if(row.some(x => x.trim() !== "")) rows.push(row);

  const headers = rows.shift().map(h => h.trim());

  return rows.map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (r[i] ?? "").trim());
    return obj;
  });
}

function norm(s){
  return (s ?? "").replace(/\s+/g, " ").trim();
}

function cardHTML(d){
  const id = norm(d["Identificador"]);
  const titulo = norm(d["Titulo"]) || "Documento";
  const autores = norm(d["Autores"]) || "-";
  const anio = norm(d["Año"]) || "-";
  const rol = norm(d["Rol"]) || "-";
  const estado = norm(d["Estado"]) || "Preprint";
  const doi = norm(d["DOI"]);
  const link = norm(d["LINK"]);
  const citas = norm(d["Citas_internas"]) || "0";

  return `
    <div class="item">
      <div class="itemt">
        ${id ? `<a href="articulo.html?id=${encodeURIComponent(id)}">${titulo}</a>` : titulo}
      </div>

      <div class="itemm">
        ${autores} · ${anio} · ${rol} · ${estado} · ID ${id || "-"}
      </div>

      ${doi ? `<div class="itemm">DOI: ${doi}</div>` : ""}

      ${link ? `<div class="itemm"><a href="${link}" target="_blank" rel="noopener" class="linkpdf">Abrir enlace a PDF</a></div>` : ""}

      <div class="itemm">Citas internas: ${citas}</div>
    </div>
  `;
}

const list = document.getElementById("list");
const msg = document.getElementById("msg");

(async () => {
  try {
    const res = await fetch(CSV_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("No se pudo leer el Google Sheet");

    const csv = await res.text();
    const all = parseCSV(csv);

    if (!all.length) {
      msg.textContent = "No hay preprints registrados.";
      return;
    }

    list.innerHTML = all.map(cardHTML).join("");
    msg.textContent = "";
  } catch (e) {
    msg.textContent = e.message;
  }
})();
</script>
